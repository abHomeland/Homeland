<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فصيل شرطة هوميلاند</title>
    <style>
        :root {
            --gold: #d4af37;
            --black-bg: #0a0a0a;
            --box-bg: #1a1a1a;
        }

        body {
            background-color: var(--black-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* مكان الصورة في الأعلى */
        .header-image {
            width: 100%;
            max-width: 600px;
            height: 250px;
            background-color: #222;
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .header-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الأزرار الرئيسية */
        .action-box {
            width: 100%;
            max-width: 500px;
            background-color: var(--box-bg);
            border: 1px solid var(--gold);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--gold);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .action-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .action-box h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }

        .action-box p {
            margin: 0;
            color: #ccc;
            font-size: 1rem;
        }

        /* الفوتر */
        footer {
            margin-top: 40px;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- مكان الصورة (قم بتغيير src بالرابط الخاص بصورتك) -->
    <div class="header-image">
        <img src="your-image-url.jpg" alt="صورة الفصيل">
    </div>

    <!-- الزر الأول -->
    <a href="https://abhomeland.github.io/a_b-Homeland/" class="action-box">
        <h2>مايكرو الخاص بفصيل شرطة هوميلاند</h2>
        <p>قائمة الأوامر والانتهاكات الكاملة للفصيل</p>
    </a>

    <!-- الزر الثاني -->
    <a href="#" class="action-box">
        <h2>دليل و متطلبات الترقية في فصيل شرطة هوميلاند</h2>
        <p>الأنظمة والتعليمات والقوانين الإرشادية</p>
    </a>

    <footer>
        تم إنشاء هذا الموقع بواسطة Im Iraqi
    </footer>

</body>
</html>
